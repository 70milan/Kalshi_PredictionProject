services:
  # ─────────────────────────────────────────────
  # SPARK ETL ORCHESTRATOR (1 container, sequential)
  # Runs all Silver + Gold transforms inside ONE JVM.
  # ─────────────────────────────────────────────
  spark-app:
    build: .
    container_name: predictiq_spark_etl
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
    command: ["python3", "-u", "orchestration/run_etl.py"]
    working_dir: /app

  # ─────────────────────────────────────────────
  # 1. LEGISLATIVE TICKER ENGINE (CONGRESS.GOV API)
  # ─────────────────────────────────────────────
  congress-ingest:
    build: .
    container_name: predictiq-congress-daemon
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    command: python3 -u ingestion/congress_legislative_ingest.py --daemon

  # ─────────────────────────────────────────────
  # 2. UNIFIED LEFT WING / MAINSTREAM MEDIA WORKERS
  # ─────────────────────────────────────────────
  politico-picks-worker:
    build: .
    container_name: worker-left-politico-picks
    restart: unless-stopped
    volumes:
      - .:/app
    working_dir: /app
    command: python3 -u ingestion/unified_left_ingest.py --source politico_picks --daemon

