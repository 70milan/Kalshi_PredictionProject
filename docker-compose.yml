services:
  # ─────────────────────────────────────────────
  # SPARK ETL ORCHESTRATOR (1 container, sequential)
  # Runs all Silver + Gold transforms inside ONE JVM.
  # ─────────────────────────────────────────────
  spark-app:
    build: .
    container_name: predictiq_spark_etl
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
    command: ["python3", "-u", "orchestration/run_etl.py"]
    working_dir: /app

  # ─────────────────────────────────────────────
  # BRONZE INGESTORS (9 lightweight Python daemons)
  # ─────────────────────────────────────────────
  ingest-bbc:
    build: .
    container_name: predictiq_ingest_bbc
    restart: unless-stopped
    volumes:
      - .:/app
    command: ["python3", "-u", "ingestion/bbc_ingest.py"]
    working_dir: /app

  ingest-cnn:
    build: .
    container_name: predictiq_ingest_cnn
    restart: unless-stopped
    volumes:
      - .:/app
    command: ["python3", "-u", "ingestion/cnn_ingest.py"]
    working_dir: /app

  ingest-fox:
    build: .
    container_name: predictiq_ingest_fox
    restart: unless-stopped
    volumes:
      - .:/app
    command: ["python3", "-u", "ingestion/fox_ingest.py"]
    working_dir: /app

  ingest-hindu:
    build: .
    container_name: predictiq_ingest_hindu
    restart: unless-stopped
    volumes:
      - .:/app
    command: ["python3", "-u", "ingestion/hindu_ingest.py"]
    working_dir: /app

  ingest-nypost:
    build: .
    container_name: predictiq_ingest_nypost
    restart: unless-stopped
    volumes:
      - .:/app
    command: ["python3", "-u", "ingestion/nypost_ingest.py"]
    working_dir: /app

  ingest-nyt:
    build: .
    container_name: predictiq_ingest_nyt
    restart: unless-stopped
    volumes:
      - .:/app
    command: ["python3", "-u", "ingestion/nyt_news_ingest.py"]
    working_dir: /app

  ingest-gdelt-events:
    build: .
    container_name: predictiq_ingest_gdelt_events
    restart: unless-stopped
    volumes:
      - .:/app
    command: ["python3", "-u", "ingestion/gdelt_events_ingest.py"]
    working_dir: /app

  ingest-gdelt-gkg:
    build: .
    container_name: predictiq_ingest_gdelt_gkg
    restart: unless-stopped
    volumes:
      - .:/app
    command: ["python3", "-u", "ingestion/gdelt_gkg_ingest.py"]
    working_dir: /app

  ingest-kalshi-active:
    build: .
    container_name: predictiq_ingest_kalshi_active
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
    command: ["python3", "-u", "ingestion/kalshi_markets_active.py"]
    working_dir: /app

  # ─────────────────────────────────────────────
  # API SERVER — live trading (Tailscale direct, port 8000)
  # ─────────────────────────────────────────────
  api-live:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: predictiq_api_live
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - READONLY_MODE=false
    volumes:
      - .:/app
    ports:
      - "100.67.60.86:8000:8000"
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    working_dir: /app

  # ─────────────────────────────────────────────
  # API SERVER — read-only (Tailscale Funnel / public, port 8001)
  # ─────────────────────────────────────────────
  api-readonly:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: predictiq_api_readonly
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - READONLY_MODE=true
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:8001:8001"
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8001"]
    working_dir: /app
